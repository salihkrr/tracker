    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 24px 20px 0 20px;
  }
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 4px;
  }
  .date {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
    min-width: 170px;
  }
  .nav-arrow {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    font-size: 18px;
    line-height: 1;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .nav-arrow:disabled {
    color: var(--text-muted);
    opacity: 0.4;
    cursor: default;
  }
  .nav-arrow:active:not(:disabled) { border-color: var(--gold); }
  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 28px;
    margin: 0 0 20px 0;
    letter-spacing: 0.01em;
  }
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--card-border);
    padding: 0 20px;
  }
  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px 0 14px 0;
    cursor: pointer;
    position: relative;
  }
  .tab.active { color: var(--text); }
  .tab.active::after {
    content: "";
    position: absolute;
    bottom: -1px; left: 20%; right: 20%;
    height: 2px;
    background: var(--gold);
  }
  main {
    flex: 1;
    padding: 20px 20px 40px 20px;
    overflow-y: auto;
  }
  .view { display: none; }
  .view.active { display: block; }

  /* Habit cards */
  .habit-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 16px 16px 14px 16px;
    margin-bottom: 10px;
  }
  .habit-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 12px;
  }
  .habit-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
  }
  .habit-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    flex-shrink: 0;
  }
  .habit-remove:active { color: var(--danger); }
  .habit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .dots { display: flex; gap: 6px; }
  .dot {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--pitch-dim);
    border: 1px solid var(--card-border);
  }
  .dot.done { background: var(--pitch); border-color: var(--pitch); }
  .dot.today {
    border: 1px solid var(--gold);
    cursor: pointer;
  }
  .dot.today.done { background: var(--gold); border-color: var(--gold); }
  .streak {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--gold);
    white-space: nowrap;
    margin-left: 10px;
  }
  .streak.zero { color: var(--text-muted); }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .add-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
  }
  .add-input::placeholder { color: var(--text-muted); }
  .add-input:focus { outline: none; border-color: var(--gold); }
  .add-btn {
    background: var(--gold);
    color: #1A1508;
    border: none;
    border-radius: 10px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 20px;
    width: 46px;
    cursor: pointer;
  }
  .add-btn:active { background: var(--gold-dim); }

  /* Todos */
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 14px 14px;
    margin-bottom: 8px;
  }
  .checkbox {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1px solid var(--text-muted);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .checkbox.done { background: var(--pitch); border-color: var(--pitch); }
  .checkbox.done::after {
    content: "✓";
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
  }
  .todo-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
  }
  .todo-text.done {
    color: var(--text-muted);
    text-decoration: line-through;
  }
  .todo-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 4px;
  }
  .todo-remove:active { color: var(--danger); }

  .empty {
    color: var(--text-muted);
    font-size: 14px;
    padding: 30px 4px;
    text-align: center;
  }

  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 2px 0 10px 2px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="date-nav">
      <button class="nav-arrow" id="prevDayBtn" aria-label="Vorheriger Tag">‹</button>
      <div class="date" id="dateLabel"></div>
      <button class="nav-arrow" id="nextDayBtn" aria-label="Nächster Tag">›</button>
    </div>
    <h1>Tracker</h1>
    <div class="tabs">
      <button class="tab active" data-view="habits">Gewohnheiten</button>
      <button class="tab" data-view="todos">Aufgaben</button>
    </div>
  </header>
  <main>
    <div class="view active" id="view-habits">
      <div class="section-label" id="habitsLabel"></div>
      <div id="habitList"></div>
      <div class="add-row">
        <input class="add-input" id="habitInput" placeholder="Neue Gewohnheit…" maxlength="60">
        <button class="add-btn" id="habitAddBtn">+</button>
      </div>
    </div>
    <div class="view" id="view-todos">
      <div class="add-row" style="margin-bottom:16px;">
        <input class="add-input" id="todoInput" placeholder="Neue Aufgabe…" maxlength="120">
        <button class="add-btn" id="todoAddBtn">+</button>
      </div>
      <div id="todoList"></div>
    </div>
  </main>
</div>

<script>
const KEY = 'tracker-data';
let state = { habits: [], todos: [] };

const WEEKDAYS = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function todayStr(offsetDays = 0) {
  const d = new Date();
  d.setDate(d.getDate() - offsetDays);
  return d.toISOString().slice(0,10);
}

// Tag, den der Nutzer sich gerade ansieht (Standard: heute)
let viewedDate = todayStr(0);

function dateRelativeTo(baseStr, offsetDays) {
  const d = new Date(baseStr + 'T00:00:00');
  d.setDate(d.getDate() - offsetDays);
  return d.toISOString().slice(0,10);
}

function shiftViewedDate(days) {
  const next = dateRelativeTo(viewedDate, -days);
  if (next > todayStr(0)) return; // nicht in die Zukunft
  viewedDate = next;
  render();
}

function renderDateLabel() {
  const d = new Date(viewedDate + 'T00:00:00');
  const isToday = viewedDate === todayStr(0);
  const label = `${WEEKDAYS[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]}`;
  document.getElementById('dateLabel').textContent = isToday ? `${label} · Heute` : label;
  document.getElementById('nextDayBtn').disabled = isToday;
  document.getElementById('habitsLabel').textContent = 'Letzte 7 Tage';
}

function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      state = JSON.parse(raw);
    }
  } catch (e) {
    // keine Daten vorhanden oder ungueltig, Standard beibehalten
  }
  render();
}

function saveState() {
  try {
    localStorage.setItem(KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Speichern fehlgeschlagen', e);
  }
}

function calcStreak(habit) {
  let streak = 0;
  let i = 0;
  while (habit.doneDates.includes(todayStr(i))) {
    streak++;
    i++;
  }
  return streak;
}

function renderHabits() {
  const list = document.getElementById('habitList');
  if (state.habits.length === 0) {
    list.innerHTML = '<div class="empty">Noch keine Gewohnheit angelegt.</div>';
    return;
  }
  list.innerHTML = '';
  state.habits.forEach(habit => {
    const card = document.createElement('div');
    card.className = 'habit-card';

    const top = document.createElement('div');
    top.className = 'habit-top';
    const name = document.createElement('div');
    name.className = 'habit-name';
    name.textContent = habit.name;
    const remove = document.createElement('button');
    remove.className = 'habit-remove';
    remove.textContent = '×';
    remove.onclick = () => {
      state.habits = state.habits.filter(h => h.id !== habit.id);
      saveState(); renderHabits();
    };
    top.appendChild(name);
    top.appendChild(remove);

    const row = document.createElement('div');
    row.className = 'habit-row';
    const dots = document.createElement('div');
    dots.className = 'dots';
    for (let i = 6; i >= 0; i--) {
      const ds = dateRelativeTo(viewedDate, i);
      const dot = document.createElement('div');
      dot.className = 'dot' + (habit.doneDates.includes(ds) ? ' done' : '') + (i === 0 ? ' today' : '');
      if (i === 0) {
        dot.onclick = () => {
          const idx = habit.doneDates.indexOf(ds);
          if (idx >= 0) habit.doneDates.splice(idx, 1);
          else habit.doneDates.push(ds);
          saveState(); renderHabits();
        };
      }
      dots.appendChild(dot);
    }
    const streak = calcStreak(habit);
    const streakEl = document.createElement('div');
    streakEl.className = 'streak' + (streak === 0 ? ' zero' : '');
    streakEl.textContent = streak > 0 ? `🔥 ${streak}` : '–';

    row.appendChild(dots);
    row.appendChild(streakEl);
    card.appendChild(top);
    card.appendChild(row);
    list.appendChild(card);
  });
}

function renderTodos() {
  const list = document.getElementById('todoList');
  if (state.todos.length === 0) {
    list.innerHTML = '<div class="empty">Keine offenen Aufgaben.</div>';
    return;
  }
  list.innerHTML = '';
  // open first, then done
  const sorted = [...state.todos].sort((a,b) => a.done - b.done);
  sorted.forEach(todo => {
    const item = document.createElement('div');
    item.className = 'todo-item';

    const box = document.createElement('div');
    box.className = 'checkbox' + (todo.done ? ' done' : '');
    box.onclick = () => {
      todo.done = !todo.done;
      saveState(); renderTodos();
    };

    const text = document.createElement('div');
    text.className = 'todo-text' + (todo.done ? ' done' : '');
    text.textContent = todo.text;

    const remove = document.createElement('button');
    remove.className = 'todo-remove';
    remove.textContent = '×';
    remove.onclick = () => {
      state.todos = state.todos.filter(t => t.id !== todo.id);
      saveState(); renderTodos();
    };

    item.appendChild(box);
    item.appendChild(text);
    item.appendChild(remove);
    list.appendChild(item);
  });
}

function render() {
  renderDateLabel();
  renderHabits();
  renderTodos();
}

function addHabit() {
  const input = document.getElementById('habitInput');
  const val = input.value.trim();
  if (!val) return;
  state.habits.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2,7), name: val, doneDates: [] });
  input.value = '';
  saveState(); renderHabits();
}

function addTodo() {
  const input = document.getElementById('todoInput');
  const val = input.value.trim();
  if (!val) return;
  state.todos.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2,7), text: val, done: false });
  input.value = '';
  saveState(); renderTodos();
}

document.getElementById('habitAddBtn').onclick = addHabit;
document.getElementById('habitInput').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });
document.getElementById('todoAddBtn').onclick = addTodo;
document.getElementById('todoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
  };
});

document.getElementById('prevDayBtn').onclick = () => shiftViewedDate(-1);
document.getElementById('nextDayBtn').onclick = () => shiftViewedDate(1);

loadState();
</script>
</body>
</html>
